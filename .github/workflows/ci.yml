name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend and server
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Check server syntax
        run: node --check server/*.js
